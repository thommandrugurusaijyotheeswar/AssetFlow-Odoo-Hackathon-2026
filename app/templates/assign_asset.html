<!DOCTYPE html>
<html>

<head>

<title>Assign Asset</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h2>Assign Asset</h2>

<form method="POST">

<div class="mb-3">

<label>Asset</label>

<input
class="form-control"
value="{{ asset.asset_name }}"
readonly>

</div>

<div class="mb-3">

<label>Select Employee</label>

<select
name="employee"
class="form-select">

{% for emp in employees %}

<option>{{ emp.name }}</option>

{% endfor %}

</select>

</div>

<button class="btn btn-success">

Assign Asset

</button>

</form>

</div>

</div>

</body>

</html>
