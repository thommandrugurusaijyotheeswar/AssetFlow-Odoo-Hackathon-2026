<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetFlow Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:linear-gradient(135deg,#ac2798,#7c3aed);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{
            width:420px;
            border-radius:20px;
            padding:40px;
            background:white;
            box-shadow:0px 15px 40px rgba(0,0,0,.2);
        }

        .logo{
            font-size:45px;
            text-align:center;
        }

        h2{
            text-align:center;
            margin-top:10px;
            margin-bottom:25px;
            font-weight:bold;
        }

        .btn-primary{
            width:100%;
            border-radius:10px;
        }

        .footer{
            margin-top:20px;
            text-align:center;
            color:gray;
            font-size:14px;
        }
    </style>
</head>

<body>

<div class="login-card">

    <div class="logo">
        📦
    </div>

    <h2>AssetFlow</h2>

    <form>

        <div class="mb-3">
            <label>Email</label>
            <input
                type="email"
                class="form-control"
                placeholder="Enter Email">
        </div>

        <div class="mb-4">
            <label>Password</label>
            <input
                type="password"
                class="form-control"
                placeholder="Enter Password">
        </div>

        <a href="/dashboard" class="btn btn-primary w-100">
            Login
        </a>

    </form>

    <div class="footer">
        Odoo Hackathon 2026
    </div>

</div>

</body>
</html>
