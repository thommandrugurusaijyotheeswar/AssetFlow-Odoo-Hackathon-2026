<!DOCTYPE html>
<html>

<head>
    <title>Edit Employee</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h2>Edit Employee</h2>

<form method="POST">

<div class="mb-3">
<label>Employee ID</label>
<input type="text"
       name="emp_id"
       class="form-control"
       value="{{ employee.emp_id }}"
       required>
</div>

<div class="mb-3">
<label>Name</label>
<input type="text"
       name="name"
       class="form-control"
       value="{{ employee.name }}"
       required>
</div>

<div class="mb-3">
<label>Department</label>
<input type="text"
       name="department"
       class="form-control"
       value="{{ employee.department }}"
       required>
</div>

<div class="mb-3">
<label>Email</label>
<input type="email"
       name="email"
       class="form-control"
       value="{{ employee.email }}"
       required>
</div>

<button class="btn btn-success">
Update Employee
</button>

<a href="/employees" class="btn btn-secondary">
Cancel
</a>

</form>

</div>

</div>

</body>

</html>
