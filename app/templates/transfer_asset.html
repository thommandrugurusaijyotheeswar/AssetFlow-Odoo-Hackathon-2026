<!DOCTYPE html>
<html>

<head>

<title>Transfer Asset</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h2>Transfer Request</h2>

<form method="POST">

<div class="mb-3">

<label>Current Holder</label>

<input
type="text"
class="form-control"
value="{{ asset.assigned_to }}"
readonly>

</div>

<div class="mb-3">

<label>Transfer To</label>

<input
type="text"
name="employee"
class="form-control"
required>

</div>

<button class="btn btn-primary">
Submit Transfer
</button>

<a href="/assets"
class="btn btn-secondary">
Cancel
</a>

</form>

</div>

</div>

</body>

</html>
