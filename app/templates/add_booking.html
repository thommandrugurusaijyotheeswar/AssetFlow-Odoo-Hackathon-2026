<!DOCTYPE html>
<html>

<head>

<title>Book Resource</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h2>📅 Book Resource</h2>

<form method="POST">

<div class="mb-3">

<label>Asset Name</label>

<input
type="text"
name="asset_name"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Employee</label>

<input
type="text"
name="employee"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Booking Date</label>

<input
type="date"
name="booking_date"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Start Time</label>

<input
type="time"
name="start_time"
class="form-control"
required>

</div>

<div class="mb-3">

<label>End Time</label>

<input
type="time"
name="end_time"
class="form-control"
required>

</div>

<button class="btn btn-success">

Book Resource

</button>

<a href="/bookings"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</body>

</html>
