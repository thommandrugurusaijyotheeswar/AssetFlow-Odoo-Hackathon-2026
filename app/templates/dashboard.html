<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetFlow Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f7fb;
        }

        .sidebar{
            width:250px;
            height:100vh;
            background:#1e9781;
            color:white;
            position:fixed;
            padding-top:30px;
        }

        .sidebar h3{
            text-align:center;
            margin-bottom:40px;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:15px 25px;
        }

        .sidebar a:hover{
            background:#65146c;
        }

        .content{
            margin-left:260px;
            padding:30px;
        }

        .card{
            border:none;
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,.1);
        }

        .card h2{
            font-size:38px;
            font-weight:bold;
        }
    </style>

</head>

<body>

<div class="sidebar">

<h3>📦 AssetFlow</h3>

<a href="#">🏠 Dashboard</a>

<a href="/employees">👨 Employees</a>

<a href="#">💻 Assets</a>

<a href="#">📅 Bookings</a>

<a href="#">🔧 Maintenance</a>

<a href="#">📊 Reports</a>

<a href="#">🚪 Logout</a>

</div>

<div class="content">

<h2 class="mb-4">Dashboard</h2>

<div class="row">

<div class="col-md-3">

<div class="card p-4 text-center">

<h2>125</h2>

<p>Total Assets</p>

</div>

</div>

<div class="col-md-3">

<div class="card p-4 text-center">

<h2>84</h2>

<p>Allocated</p>

</div>

</div>

<div class="col-md-3">

<div class="card p-4 text-center">

<h2>24</h2>

<p>Available</p>

</div>

</div>

<div class="col-md-3">

<div class="card p-4 text-center">

<h2>17</h2>

<p>Maintenance</p>

</div>

</div>

</div>

</div>

</body>
</html>
