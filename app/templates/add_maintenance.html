<!DOCTYPE html>
<html>
<head>
    <title>Add Maintenance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card p-4 shadow">

<h2>Add Maintenance Request</h2>

<form method="POST">

<div class="mb-3">
<label>Asset Name</label>
<input type="text" name="asset_name" class="form-control" required>
</div>

<div class="mb-3">
<label>Issue</label>
<textarea name="issue" class="form-control" required></textarea>
</div>

<div class="mb-3">
<label>Request Date</label>
<input type="date" name="request_date" class="form-control" required>
</div>

<button class="btn btn-success">
Submit
</button>

<a href="/maintenance" class="btn btn-secondary">
Back
</a>

</form>

</div>

</div>

</body>
</html>
